<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | WhatsBridge by ERPAGENT</title>
<meta name="description" content="Sign in to WhatsBridge — your WhatsApp messaging dashboard powered by ERPAGENT."/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg-primary: #0a0a0f;
    --bg-card: #12121a;
    --bg-input: #1a1a2e;
    --accent: #10b981;
    --accent-hover: #059669;
    --secondary: #6366f1;
    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
    --border: rgba(255,255,255,0.08);
    --glass: rgba(255,255,255,0.03);
  }

  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    position: relative;
    overflow: hidden;
  }

  /* ── Animated gradient background ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: linear-gradient(
      135deg,
      #0a0a1a 0%,
      #0f0a20 25%,
      #0a1020 50%,
      #140a22 75%,
      #0a0a1a 100%
    );
    background-size: 400% 400%;
    animation: gradientShift 20s ease infinite;
    z-index: 0;
  }

  @keyframes gradientShift {
    0%   { background-position: 0% 50%; }
    25%  { background-position: 100% 0%; }
    50%  { background-position: 100% 100%; }
    75%  { background-position: 0% 100%; }
    100% { background-position: 0% 50%; }
  }

  /* ── Ambient glow orbs ── */
  .orb {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    filter: blur(100px);
    z-index: 0;
  }
  .orb--accent {
    width: 420px;
    height: 420px;
    background: rgba(16, 185, 129, 0.06);
    top: -10%;
    left: -8%;
    animation: orbFloat 18s ease-in-out infinite;
  }
  .orb--secondary {
    width: 350px;
    height: 350px;
    background: rgba(99, 102, 241, 0.05);
    bottom: -12%;
    right: -8%;
    animation: orbFloat 22s ease-in-out infinite reverse;
  }

  @keyframes orbFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33%      { transform: translate(30px, -20px) scale(1.05); }
    66%      { transform: translate(-20px, 15px) scale(0.95); }
  }

  /* ── Main container ── */
  .login-wrapper {
    width: 100%;
    max-width: 440px;
    position: relative;
    z-index: 10;
  }

  /* ── Brand header ── */
  .brand {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 2.5rem;
  }
  .brand__icon-box {
    width: 56px;
    height: 56px;
    background: linear-gradient(135deg, var(--accent), var(--accent-hover));
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1rem;
    box-shadow: 0 8px 32px rgba(16, 185, 129, 0.25);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }
  .brand__icon-box:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(16, 185, 129, 0.35);
  }
  .brand__icon-box .material-symbols-outlined {
    font-size: 30px;
    color: #fff;
    font-variation-settings: 'FILL' 1;
  }
  .brand__title {
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.02em;
  }
  .brand__subtitle {
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--text-secondary);
    margin-top: 0.25rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  /* ── Glass card ── */
  .card {
    background: rgba(18, 18, 26, 0.65);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2.25rem;
    box-shadow:
      0 24px 64px rgba(0, 0, 0, 0.4),
      inset 0 1px 0 rgba(255, 255, 255, 0.04);
    transition: box-shadow 0.4s ease;
  }
  .card:hover {
    box-shadow:
      0 28px 72px rgba(0, 0, 0, 0.45),
      inset 0 1px 0 rgba(255, 255, 255, 0.06);
  }
  .card__heading {
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 0.35rem;
  }
  .card__subheading {
    font-size: 0.875rem;
    color: var(--text-secondary);
    margin-bottom: 2rem;
    line-height: 1.5;
  }

  /* ── Error message ── */
  .error-msg {
    display: none;
    margin-bottom: 1.25rem;
    padding: 0.75rem 1rem;
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid rgba(239, 68, 68, 0.25);
    color: #fca5a5;
    font-size: 0.85rem;
    border-radius: 12px;
    line-height: 1.4;
    animation: shakeIn 0.35s ease;
  }
  .error-msg.visible {
    display: block;
  }

  @keyframes shakeIn {
    0%   { transform: translateX(-6px); opacity: 0; }
    25%  { transform: translateX(4px); }
    50%  { transform: translateX(-2px); }
    100% { transform: translateX(0); opacity: 1; }
  }

  /* ── Form ── */
  .form {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  .field__label {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-secondary);
  }
  .field__input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }
  .field__icon {
    position: absolute;
    left: 14px;
    color: var(--text-secondary);
    font-size: 20px;
    transition: color 0.25s ease;
    pointer-events: none;
  }
  .field__input-wrap:focus-within .field__icon {
    color: var(--accent);
  }

  .field__input {
    width: 100%;
    padding: 0.85rem 1rem 0.85rem 2.85rem;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    font-size: 0.925rem;
    outline: none;
    transition: border-color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
  }
  .field__input::placeholder {
    color: rgba(148, 163, 184, 0.5);
  }
  .field__input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.12);
    background: rgba(26, 26, 46, 0.9);
  }

  /* Password field extra right padding for toggle */
  .field__input--password {
    padding-right: 3rem;
  }

  .field__toggle {
    position: absolute;
    right: 12px;
    background: none;
    border: none;
    color: var(--text-secondary);
    cursor: pointer;
    padding: 4px;
    display: flex;
    align-items: center;
    transition: color 0.25s ease;
  }
  .field__toggle:hover {
    color: var(--accent);
  }
  .field__toggle .material-symbols-outlined {
    font-size: 20px;
  }

  /* ── Submit button ── */
  .btn-submit {
    width: 100%;
    padding: 0.95rem;
    background: linear-gradient(135deg, var(--accent), var(--accent-hover));
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    box-shadow: 0 4px 24px rgba(16, 185, 129, 0.25);
    transition: transform 0.2s ease, box-shadow 0.3s ease, filter 0.2s ease;
    position: relative;
    overflow: hidden;
  }
  .btn-submit::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent);
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .btn-submit:hover::before {
    opacity: 1;
  }
  .btn-submit:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 32px rgba(16, 185, 129, 0.35);
  }
  .btn-submit:active {
    transform: scale(0.98) translateY(0);
  }
  .btn-submit:disabled {
    opacity: 0.7;
    cursor: not-allowed;
    transform: none;
  }
  .btn-submit .material-symbols-outlined {
    font-size: 18px;
  }

  /* ── Spinner ── */
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  .animate-spin {
    animation: spin 0.8s linear infinite;
  }

  /* ── Footer badges ── */
  .trust-badges {
    display: flex;
    justify-content: center;
    gap: 1.75rem;
    margin-top: 2.75rem;
    opacity: 0.35;
    transition: opacity 0.4s ease;
  }
  .trust-badges:hover {
    opacity: 0.7;
  }
  .trust-badge {
    display: flex;
    align-items: center;
    gap: 0.35rem;
    color: var(--text-secondary);
  }
  .trust-badge .material-symbols-outlined {
    font-size: 16px;
  }
  .trust-badge span:last-child {
    font-size: 0.6rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    body {
      padding: 1rem;
    }
    .card {
      padding: 1.75rem 1.5rem;
      border-radius: 16px;
    }
    .brand__icon-box {
      width: 48px;
      height: 48px;
      border-radius: 14px;
    }
    .brand__icon-box .material-symbols-outlined {
      font-size: 26px;
    }
    .brand__title {
      font-size: 1.4rem;
    }
    .orb--accent {
      width: 280px;
      height: 280px;
    }
    .orb--secondary {
      width: 220px;
      height: 220px;
    }
  }

  /* ── Entrance animation ── */
  .login-wrapper {
    animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  @keyframes fadeUp {
    from {
      opacity: 0;
      transform: translateY(24px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }
</style>
</head>
<body>

<!-- Ambient orbs -->
<div class="orb orb--accent"></div>
<div class="orb orb--secondary"></div>

<main class="login-wrapper">

  <!-- Brand -->
  <div class="brand">
    <div class="brand__icon-box">
      <span class="material-symbols-outlined">chat</span>
    </div>
    <h1 class="brand__title">WhatsBridge</h1>
    <p class="brand__subtitle">by ERPAGENT</p>
  </div>

  <!-- Login Card -->
  <div class="card">
    <h2 class="card__heading">Welcome Back</h2>
    <p class="card__subheading">Sign in to access your messaging dashboard.</p>

    <div id="error-msg" class="error-msg"></div>

    <form id="login-form" class="form">

      <!-- Username -->
      <div class="field">
        <label class="field__label" for="username">Username</label>
        <div class="field__input-wrap">
          <span class="material-symbols-outlined field__icon">person</span>
          <input
            class="field__input"
            id="username"
            name="username"
            placeholder="Enter username"
            required
            type="text"
            autocomplete="username"
          />
        </div>
      </div>

      <!-- Password -->
      <div class="field">
        <label class="field__label" for="password">Password</label>
        <div class="field__input-wrap">
          <span class="material-symbols-outlined field__icon">lock</span>
          <input
            class="field__input field__input--password"
            id="password"
            name="password"
            placeholder="••••••••"
            required
            type="password"
            autocomplete="current-password"
          />
          <button class="field__toggle" type="button" onclick="togglePassword()">
            <span id="eye-icon" class="material-symbols-outlined">visibility</span>
          </button>
        </div>
      </div>

      <!-- Submit -->
      <button id="login-btn" class="btn-submit" type="submit">
        Log In
        <span class="material-symbols-outlined">arrow_forward</span>
      </button>

    </form>
  </div>

  <!-- Trust badges -->
  <div class="trust-badges">
    <div class="trust-badge">
      <span class="material-symbols-outlined">verified_user</span>
      <span>Secured</span>
    </div>
    <div class="trust-badge">
      <span class="material-symbols-outlined">privacy_tip</span>
      <span>Private</span>
    </div>
  </div>

</main>

<script>
function togglePassword() {
    const p = document.getElementById('password');
    const icon = document.getElementById('eye-icon');
    if (p.type === 'password') {
        p.type = 'text';
        icon.textContent = 'visibility_off';
    } else {
        p.type = 'password';
        icon.textContent = 'visibility';
    }
}

document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const errEl = document.getElementById('error-msg');
    errEl.classList.remove('visible');
    btn.disabled = true;
    btn.innerHTML = '<span class="animate-spin material-symbols-outlined" style="font-size:18px">progress_activity</span> Signing in...';

    try {
        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
            }),
        });
        const data = await res.json();
        if (data.success) {
            window.location.href = '/';
        } else {
            errEl.textContent = data.error || 'Invalid credentials';
            errEl.classList.add('visible');
        }
    } catch (err) {
        errEl.textContent = 'Connection error. Please try again.';
        errEl.classList.add('visible');
    }

    btn.disabled = false;
    btn.innerHTML = 'Log In <span class="material-symbols-outlined" style="font-size:18px">arrow_forward</span>';
});
</script>
</body>
</html>
